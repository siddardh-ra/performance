image:
  repository: "quay.io/backstage-performance/locust-k8s-operator"
  tag: "latest"
  pullPolicy: Always

# OpenShift compatibility: Explicitly override chart defaults to allow OpenShift SCC
# to inject UID/GID. Chart v2.1.1 has hardcoded runAsUser/fsGroup: 65532 that must
# be overridden with null to let OpenShift's restricted-v2 SCC assign dynamic IDs.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: null       # Override chart default (65532) - let OpenShift SCC assign
  runAsGroup: null      # Override chart default (65532) - let OpenShift SCC assign
  fsGroup: null         # Override chart default (65532) - let OpenShift SCC assign
  seccompProfile:
    type: RuntimeDefault

# Note: Chart uses 'containerSecurityContext', not 'securityContext'
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # readOnlyRootFilesystem removed - operator may need to write temp files

k8s:
  clusterRole:
    enabled: true

config:
  loadGenerationPods:
    resource:
      cpuRequest: 250m
      memRequest: 128Mi
      ephemeralRequest: 30Mi
      cpuLimit: 2000m
      memLimit: 2Gi
      ephemeralLimit: 100Mi
    metricsExporter:
      image: "quay.io/backstage-performance/locust_exporter:latest"
      pullPolicy: Always